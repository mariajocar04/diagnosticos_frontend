<!DOCTYPE html>

<html class="light" lang="es"><head>
<meta charset="utf-8"/>

                        "surface-container-low": "#eff5ef",
                        "surface-container-high": "#e4eae4",
                        "tertiary-fixed-dim": "#ffb3ad",
                        "surface-variant": "#dee4de",
                        "tertiary-container": "#b85751",
                        "outline-variant": "#bccac1",
                        "secondary-fixed-dim": "#a4c9ff",
                        "on-surface": "#171d1a",
                        "inverse-primary": "#68dbae",
                        "primary-container": "#008560",
                        "tertiary": "#993f3a",
                        "tertiary-fixed": "#ffdad6",
                        "on-secondary-container": "#00447e",
                        "surface": "#f5fbf5",
                        "on-error": "#ffffff",
                        "on-surface-variant": "#3d4943",
                        "secondary-container": "#7ab3ff",
                        "surface-bright": "#f5fbf5",
                        "on-error-container": "#93000a",
                        "inverse-surface": "#2c322e",
                        "surface-tint": "#006c4e",
                        "on-secondary-fixed": "#001c39",
                        "on-tertiary-fixed-variant": "#7e2a27",
                        "on-primary-container": "#f5fff7",
                        "error": "#ba1a1a",
                        "surface-dim": "#d6dbd6",
                        "on-tertiary-container": "#fffbff",
                        "on-primary-fixed-variant": "#00513a",
                        "surface-container-highest": "#dee4de",
                        "surface-container": "#eaefea",
                        "on-primary-fixed": "#002115",
                        "on-tertiary": "#ffffff",
                        "secondary": "#1960a6",
                        "primary-fixed": "#86f8c9",
                        "on-background": "#171d1a",
                        "inverse-on-surface": "#ecf2ed",
                        "on-secondary": "#ffffff",
                        "on-secondary-fixed-variant": "#004883",
                        "primary": "#00694c"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",

                    "spacing": {

                        "gutter": "16px",
                        "margin-mobile": "16px",
                        "xs": "8px",

                        "sm": "12px",
                        "xl": "32px",
                        "touch-target-min": "48px",
                        "md": "16px"
                    },
                    "fontFamily": {
                        "headline-sm": ["Inter"],
                        "body-md": ["Inter"],

                    },
                    "fontSize": {

                        "body-lg": ["16px", {"lineHeight": "24px", "fontWeight": "400"}]

            },
        }

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            line-height: 1;
            text-transform: none;
            letter-spacing: normal;
            word-wrap: normal;
            white-space: nowrap;
            direction: ltr;
        }
        body {
            background-color: #f5fbf5;
            -webkit-font-smoothing: antialiased;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-surface">
<div class="min-h-screen flex flex-col md:flex-row">
<div class="hidden md:flex md:w-1/2 bg-surface-container-high items-center justify-center relative overflow-hidden">
<div class="absolute inset-0 opacity-10 bg-[radial-gradient(#00694c_1px,transparent_1px)] [background-size:20px_20px]"></div>
<div class="z-10 px-xl text-center max-w-md">
<div class="mb-lg inline-flex items-center justify-center w-16 h-16 bg-primary-container rounded-xl">
<span class="material-symbols-outlined text-on-primary-container text-[32px]">medical_services</span>
</div>
<h1 class="font-headline-lg text-headline-lg text-primary mb-sm">TICOS Health Ecosystem</h1>
<p class="font-body-lg text-body-lg text-on-surface-variant">Gestión clínica avanzada diseñada para enfermeros y administradores médicos con precisión y claridad.</p>
<div class="mt-xl">
<img alt="Clinical environment" class="rounded-xl border border-outline-variant shadow-sm w-full h-64 object-cover" data-alt="A professional medical environment featuring a high-tech clinical workspace with soft natural lighting. A nurse is seen from a respectful distance interacting with a modern digital interface. The overall aesthetic is clean, minimalist, and clinical, emphasizing the teal and white color palette of the TICOS brand. The mood is calm, authoritative, and focused on healthcare efficiency." src="https://lh3.googleusercontent.com/aida-public/AB6AXuCi9GzBfMt87YQ9SWzKWlKat8TsbDd3PCvTuDlvC12uRc8SH5nI7c77RnAD1Qw6MRkQO6XO95BggjWGHnsi-YGW1ZJygmoUJ_Ef471sBDXtCVHhrz_6TZa4nd3Vpu2UUFfIuQX8DA41q06uX_kqm_otr0B1KV_bLsLiHGcsRsNq5Bv7Vxb8h6ubv4eDX7yCy0V4OreAucs805E03XTlEaVu8lLqtrdmCA0UIjyF1Yk6b15YaD1L29t94OMprwa2erUXjFkPbegrkNrI"/>
</div>
</div>
</div>
<main class="flex-1 flex items-center justify-center px-margin-mobile py-xl md:py-0">
<div class="w-full max-w-[400px]">
<header class="mb-xl text-center md:text-left">
<div class="md:hidden flex justify-center mb-md">
<span class="font-headline-lg-mobile text-headline-lg-mobile text-primary">TICOS</span>
</div>
<h2 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface mb-xs">Crear cuenta</h2>
<p class="font-body-md text-body-md text-on-surface-variant">Complete los datos para registrarse en la plataforma clínica.</p>
</header>
<form class="space-y-lg">
<div class="space-y-base">
<label class="font-label-md text-label-md text-on-surface uppercase tracking-wider block" for="fullname">Nombre completo</label>
<div class="relative">
<input class="w-full h-touch-target-min border border-outline-variant bg-surface-container-lowest px-md rounded-lg focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary font-body-md text-on-surface placeholder:text-outline/50 transition-all" id="fullname" name="fullname" placeholder="Ej. Juan Pérez" type="text"/>
</div>
</div>
<div class="space-y-base">
<label class="font-label-md text-label-md text-on-surface uppercase tracking-wider block" for="email">Correo electrónico</label>
<div class="relative">
<input class="w-full h-touch-target-min border border-outline-variant bg-surface-container-lowest px-md rounded-lg focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary font-body-md text-on-surface placeholder:text-outline/50 transition-all" id="email" name="email" placeholder="nombre@clinica.com" type="email"/>
</div>
</div>
<div class="space-y-base">
<label class="font-label-md text-label-md text-on-surface uppercase tracking-wider block" for="password">Contraseña</label>
<div class="relative">
<input class="w-full h-touch-target-min border border-outline-variant bg-surface-container-lowest px-md rounded-lg focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary font-body-md text-on-surface placeholder:text-outline/50 transition-all" id="password" name="password" placeholder="••••••••" type="password"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-on-surface-variant" type="button">
<span class="material-symbols-outlined text-[20px]">visibility</span>
</button>
</div>
</div>
<div class="space-y-base">
<label class="font-label-md text-label-md text-on-surface uppercase tracking-wider block" for="confirm-password">Confirmar contraseña</label>
<div class="relative">
<input class="w-full h-touch-target-min border border-outline-variant bg-surface-container-lowest px-md rounded-lg focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary font-body-md text-on-surface placeholder:text-outline/50 transition-all" id="confirm-password" name="confirm-password" placeholder="••••••••" type="password"/>
</div>
</div>
<div class="flex items-start gap-xs py-xs">
<input class="mt-1 w-4 h-4 text-primary border-outline-variant rounded focus:ring-primary" id="terms" type="checkbox"/>
<label class="font-body-md text-body-md text-on-surface-variant" for="terms">
                            Acepto los <a class="text-secondary font-semibold hover:underline" href="#">Términos de Servicio</a> y la <a class="text-secondary font-semibold hover:underline" href="#">Política de Privacidad</a>.
                        </label>
</div>
<button class="w-full h-touch-target-min bg-primary-container text-on-primary-container font-headline-sm rounded-lg hover:bg-primary-container/90 active:scale-[0.98] transition-all flex items-center justify-center gap-xs" type="submit">
                        Registrarse
                    </button>
<div class="pt-lg text-center border-t border-outline-variant">
<p class="font-body-md text-body-md text-on-surface-variant">
                            ¿Ya tiene una cuenta? 
                            <a class="text-secondary font-semibold hover:underline px-xs" href="#">Iniciar sesión</a>
</p>
</div>
</form>
<footer class="mt-xl text-center md:text-left">
<div class="flex flex-wrap justify-center md:justify-start gap-sm">
<span class="inline-flex items-center px-sm py-1 bg-[#00694c]/10 text-primary font-label-md text-label-md rounded-full">
                            ENFERMERO
                        </span>
<span class="inline-flex items-center px-sm py-1 bg-[#1960a6]/10 text-secondary font-label-md text-label-md rounded-full">
                            ADMINISTRADOR
                        </span>
</div>
</footer>
</div>
</main>
</div>
</body></html>
