<!DOCTYPE html>

<html class="light" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=JetBrains+Mono:wght@500&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "background": "#f5fbf5",
                    "error-container": "#ffdad6",
                    "on-tertiary-fixed": "#410003",
                    "surface-container-lowest": "#ffffff",
                    "outline": "#6d7a73",
                    "on-primary": "#ffffff",
                    "secondary-fixed": "#d4e3ff",
                    "primary-fixed-dim": "#68dbae",
                    "surface-container-low": "#eff5ef",
                    "surface-container-high": "#e4eae4",
                    "tertiary-fixed-dim": "#ffb3ad",
                    "surface-variant": "#dee4de",
                    "tertiary-container": "#b85751",
                    "outline-variant": "#bccac1",
                    "secondary-fixed-dim": "#a4c9ff",
                    "on-surface": "#171d1a",
                    "inverse-primary": "#68dbae",
                    "primary-container": "#008560",
                    "tertiary": "#993f3a",
                    "tertiary-fixed": "#ffdad6",
                    "on-secondary-container": "#00447e",
                    "surface": "#f5fbf5",
                    "on-error": "#ffffff",
                    "on-surface-variant": "#3d4943",
                    "secondary-container": "#7ab3ff",
                    "surface-bright": "#f5fbf5",
                    "on-error-container": "#93000a",
                    "inverse-surface": "#2c322e",
                    "surface-tint": "#006c4e",
                    "on-secondary-fixed": "#001c39",
                    "on-tertiary-fixed-variant": "#7e2a27",
                    "on-primary-container": "#f5fff7",
                    "error": "#ba1a1a",
                    "surface-dim": "#d6dbd6",
                    "on-tertiary-container": "#fffbff",
                    "on-primary-fixed-variant": "#00513a",
                    "surface-container-highest": "#dee4de",
                    "surface-container": "#eaefea",
                    "on-primary-fixed": "#002115",
                    "on-tertiary": "#ffffff",
                    "secondary": "#1960a6",
                    "primary-fixed": "#86f8c9",
                    "on-background": "#171d1a",
                    "inverse-on-surface": "#ecf2ed",
                    "on-secondary": "#ffffff",
                    "on-secondary-fixed-variant": "#004883",
                    "primary": "#00694c"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {
                    "lg": "24px",
                    "gutter": "16px",
                    "margin-mobile": "16px",
                    "xs": "8px",
                    "base": "4px",
                    "sm": "12px",
                    "xl": "32px",
                    "touch-target-min": "48px",
                    "md": "16px"
            },
            "fontFamily": {
                    "headline-sm": ["Inter"],
                    "body-md": ["Inter"],
                    "headline-md": ["Inter"],
                    "headline-lg": ["Inter"],
                    "label-md": ["Inter"],
                    "clinical-code": ["JetBrains Mono"],
                    "body-lg": ["Inter"]
            },
            "fontSize": {
                    "headline-sm": ["16px", {"lineHeight": "24px", "fontWeight": "600"}],
                    "body-md": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                    "headline-md": ["20px", {"lineHeight": "28px", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                    "headline-lg": ["24px", {"lineHeight": "32px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                    "label-md": ["12px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "600"}],
                    "clinical-code": ["14px", {"lineHeight": "20px", "fontWeight": "500"}],
                    "body-lg": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                    "headline-md-mobile": ["18px", {"lineHeight": "26px", "fontWeight": "600"}],
                    "headline-lg-mobile": ["22px", {"lineHeight": "28px", "fontWeight": "700"}]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f5fbf5;
        }
        .pb-safe {
            padding-bottom: env(safe-area-inset-bottom);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-surface antialiased min-h-screen flex flex-col">
<!-- TopAppBar -->
<header class="flex items-center justify-between px-margin-mobile h-[72px] w-full docked full-width top-0 bg-surface dark:bg-surface-dim border-b border-outline-variant dark:border-outline z-50 sticky">
<div class="flex items-center gap-sm">
<div class="w-10 h-10 rounded-full bg-secondary flex items-center justify-center text-on-secondary font-bold">
                JS
            </div>
<div class="flex flex-col">
<h1 class="font-headline-md-mobile text-headline-md-mobile text-primary dark:text-primary-fixed-dim">Hola, Jaime</h1>
<span class="font-label-md text-label-md text-on-surface-variant dark:text-outline">Unidad de Cuidados</span>
</div>
</div>
<div class="bg-primary/10 px-3 py-1 rounded-full">
<span class="font-label-md text-label-md text-primary font-bold">Enfermero</span>
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow px-margin-mobile pt-lg pb-xl max-w-2xl mx-auto w-full">
<!-- Context Chip Section -->
<div class="flex items-center gap-xs mb-lg bg-surface-container border border-outline-variant rounded-xl p-xs">
<div class="w-8 h-8 rounded-full bg-secondary-container flex items-center justify-center text-on-secondary-container font-headline-sm text-xs">
                MR
            </div>
<div class="flex flex-col">
<span class="font-label-md text-label-md text-outline uppercase tracking-wider">Paciente en curso</span>
<span class="font-headline-sm text-headline-sm text-on-surface">María Rodríguez Sánchez</span>
</div>
<div class="ml-auto pr-xs">
<span class="material-symbols-outlined text-outline">info</span>
</div>
</div>
<!-- Note Entry Section -->
<div class="flex flex-col gap-sm">
<div class="flex justify-between items-end">
<label class="font-label-md text-label-md font-bold text-on-surface-variant uppercase tracking-widest">Nota de Enfermería</label>
<span class="font-clinical-code text-clinical-code text-primary">124 caracteres</span>
</div>
<div class="relative group">
<textarea class="w-full bg-surface-container-lowest border border-outline-variant rounded-lg p-md font-body-lg text-body-lg text-on-surface focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all placeholder:text-outline/50 resize-none" placeholder="Escribe la nota clínica..." rows="12"></textarea>
<!-- Clinical UI Detail: Subtle timestamp/context indicator -->
<div class="absolute bottom-3 right-3 flex items-center gap-xs opacity-40">
<span class="material-symbols-outlined text-sm">schedule</span>
<span class="font-label-md text-[10px]">AUTO-SAVE ACTIVE</span>
</div>
</div>
<!-- Bento-style Metadata Suggestion Tiles (High-end UI Pattern) -->
<div class="grid grid-cols-2 gap-sm mt-sm">
<div class="p-sm bg-surface-container-low border border-outline-variant rounded-lg flex flex-col gap-xs hover:bg-surface-container-high transition-colors cursor-pointer">
<span class="material-symbols-outlined text-secondary" data-icon="vital_signs">vital_signs</span>
<span class="font-label-md text-label-md text-on-surface">Adjuntar Constantes</span>
</div>
<div class="p-sm bg-surface-container-low border border-outline-variant rounded-lg flex flex-col gap-xs hover:bg-surface-container-high transition-colors cursor-pointer">
<span class="material-symbols-outlined text-tertiary" data-icon="medical_information">medical_information</span>
<span class="font-label-md text-label-md text-on-surface">Plan Terapéutico</span>
</div>
</div>
</div>
</main>
<!-- Bottom Action Bar (Contextual FAB replacement for flow focus) -->
<div class="px-margin-mobile py-lg bg-surface border-t border-outline-variant flex flex-col gap-md">
<button class="w-full h-touch-target-min bg-primary text-on-primary rounded-xl font-headline-sm text-headline-sm flex items-center justify-center gap-sm active:scale-95 transition-transform shadow-sm">
<span class="material-symbols-outlined" data-weight="fill">save</span>
            Guardar nota
        </button>
<button class="w-full h-touch-target-min border border-secondary text-secondary rounded-xl font-label-md text-label-md flex items-center justify-center uppercase tracking-widest hover:bg-secondary/5 transition-colors">
            Descartar borrador
        </button>
</div>
<!-- Persistent Navigation Shell -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center bg-surface dark:bg-surface-dim px-xs pb-safe h-[64px] border-t border-outline-variant dark:border-outline">
<div class="flex flex-col items-center justify-center text-on-surface-variant dark:text-outline hover:bg-surface-container-low px-3 py-1 rounded-xl">
<span class="material-symbols-outlined" data-icon="search">search</span>
<span class="font-label-md text-label-md">Buscar</span>
</div>
<div class="flex flex-col items-center justify-center text-primary dark:text-primary-fixed-dim bg-primary-container/10 rounded-xl px-3 py-1 scale-95 transition-transform duration-100">
<span class="material-symbols-outlined" data-icon="groups" style="font-variation-settings: 'FILL' 1;">groups</span>
<span class="font-label-md text-label-md">Pacientes</span>
</div>
<div class="flex flex-col items-center justify-center text-on-surface-variant dark:text-outline hover:bg-surface-container-low px-3 py-1 rounded-xl">
<span class="material-symbols-outlined" data-icon="admin_panel_settings">admin_panel_settings</span>
<span class="font-label-md text-label-md">Admin</span>
</div>
<div class="flex flex-col items-center justify-center text-on-surface-variant dark:text-outline hover:bg-surface-container-low px-3 py-1 rounded-xl">
<span class="material-symbols-outlined" data-icon="star">star</span>
<span class="font-label-md text-label-md">Favoritos</span>
</div>
<div class="flex flex-col items-center justify-center text-on-surface-variant dark:text-outline hover:bg-surface-container-low px-3 py-1 rounded-xl">
<span class="material-symbols-outlined" data-icon="person">person</span>
<span class="font-label-md text-label-md">Perfil</span>
</div>
</nav>
<!-- Spacer for Navigation -->
<div class="h-[64px] pb-safe"></div>
</body></html>
