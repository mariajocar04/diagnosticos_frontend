<style>
        body {
            background-color: #131313;
            font-family: 'Inter', sans-serif;
            color: #e5e2e1;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }

<body class="bg-background min-h-screen flex flex-col">
<!-- Linear/Transactional flow: Navigation shells are suppressed per Hierarchy rules -->
<main class="flex-grow flex flex-col items-center justify-center px-margin-mobile">
<div class="w-full max-w-md">
<!-- Brand Anchor -->
<div class="mb-xl flex flex-col items-center">
<div class="w-16 h-16 bg-primary/10 rounded-xl flex items-center justify-center mb-md">
<span class="material-symbols-outlined text-primary text-[32px]" data-icon="medical_services">medical_services</span>
</div>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-primary tracking-tight">TICOS Health</h1>
<p class="font-body-md text-body-md text-on-surface-variant mt-xs">Sistema de Gestión Clínica</p>
</div>
<!-- Login Form -->
<div class="space-y-lg">
<!-- Email Field -->
<div class="flex flex-col space-y-base">
<label class="font-label-md text-label-md text-on-surface-variant uppercase tracking-wider pl-base" for="email">Correo electrónico</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-md top-1/2 -translate-y-1/2 text-outline" data-icon="mail">mail</span>
<input class="w-full h-[56px] pl-12 pr-md border border-outline-variant rounded-lg focus:border-primary focus:ring-1 focus:ring-primary bg-surface-container-low text-on-surface font-body-lg text-body-lg transition-all placeholder:text-outline/50" id="email" name="email" placeholder="ejemplo@clinica.com" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="flex flex-col space-y-base">
<div class="flex justify-between items-center px-base">
<label class="font-label-md text-label-md text-on-surface-variant uppercase tracking-wider" for="password">Contraseña</label>
<a class="font-label-md text-label-md text-secondary hover:underline" href="#">¿Olvidaste tu contraseña?</a>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute left-md top-1/2 -translate-y-1/2 text-outline" data-icon="lock">lock</span>
<input class="w-full h-[56px] pl-12 pr-12 border border-outline-variant rounded-lg focus:border-primary focus:ring-1 focus:ring-primary bg-surface-container-low text-on-surface font-body-lg text-body-lg transition-all placeholder:text-outline/50" id="password" name="password" placeholder="••••••••" type="password"/>
<button class="absolute right-md top-1/2 -translate-y-1/2 text-outline" type="button">
<span class="material-symbols-outlined" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<!-- Primary Action -->
<button class="w-full h-[48px] bg-primary text-on-primary font-headline-sm text-headline-sm rounded-lg hover:opacity-90 active:scale-[0.98] transition-all flex items-center justify-center gap-xs">
                Iniciar sesión
            </button>
</div>
<!-- Visual Separator -->
<div class="my-xl flex items-center gap-md">
<div class="h-[1px] flex-grow bg-outline-variant"></div>
<span class="font-label-md text-label-md text-outline">O BIEN</span>
<div class="h-[1px] flex-grow bg-outline-variant"></div>
</div>
<!-- Alternative Actions -->
<div class="flex flex-col items-center gap-lg">
<a class="font-body-md text-body-md text-secondary font-semibold hover:underline flex items-center gap-xs" href="#">
                Continuar como invitado
                <span class="material-symbols-outlined text-[18px]" data-icon="arrow_forward">arrow_forward</span>
</a>
</div>
</div>
</main>
<!-- Visual Anchor / Footer -->
<footer class="p-lg flex flex-col items-center gap-sm">
<div class="flex gap-md opacity-40 grayscale contrast-125 invert">
