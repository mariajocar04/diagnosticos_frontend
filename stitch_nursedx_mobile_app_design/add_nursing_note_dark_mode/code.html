<!DOCTYPE html>

<html class="dark" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=JetBrains+Mono:wght@500&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
  tailwind.config = {
    darkMode: "class",
    theme: {
      extend: {
        "colors": {
                "secondary-fixed-dim": "#a2c9ff",
                "secondary-container": "#0274cb",
                "inverse-surface": "#e5e2e1",
                "on-error": "#690005",
                "surface-container": "#201f1f",
                "outline": "#86948b",
                "on-secondary-container": "#f7f8ff",
                "error-container": "#93000a",
                "primary-container": "#23c18f",
                "tertiary-container": "#ff8978",
                "on-primary-fixed-variant": "#005139",
                "on-tertiary-fixed-variant": "#80291f",
                "on-tertiary": "#61120b",
                "secondary-fixed": "#d3e4ff",
                "tertiary-fixed": "#ffdad5",
                "surface-container-highest": "#353534",
                "surface-container-lowest": "#0e0e0e",
                "on-tertiary-fixed": "#410000",
                "tertiary-fixed-dim": "#ffb4a8",
                "on-primary": "#003827",
                "surface-dim": "#131313",
                "on-secondary-fixed-variant": "#004881",
                "surface": "#131313",
                "error": "#ffb4ab",
                "primary": "#4edeaa",
                "surface-tint": "#4edeaa",
                "on-primary-fixed": "#002115",
                "primary-fixed-dim": "#4edeaa",
                "inverse-on-surface": "#313030",
                "inverse-primary": "#006c4d",
                "on-primary-container": "#004933",
                "surface-container-high": "#2a2a2a",
                "on-surface-variant": "#bbcac1",
                "surface-container-low": "#1c1b1b",
                "on-error-container": "#ffdad6",
                "secondary": "#a2c9ff",
                "surface-variant": "#353534",
                "on-secondary-fixed": "#001c38",
                "surface-bright": "#393939",
                "on-secondary": "#00315c",
                "on-surface": "#e5e2e1",
                "outline-variant": "#3c4a43",
                "primary-fixed": "#6efbc4",
                "on-tertiary-container": "#752118",
                "on-background": "#e5e2e1",
                "tertiary": "#ffb4a8",
                "background": "#131313"
        },
        "borderRadius": {
                "DEFAULT": "0.25rem",
                "lg": "0.5rem",
                "xl": "0.75rem",
                "full": "9999px"
        },
        "spacing": {
                "md": "16px",
                "xs": "4px",
                "margin-desktop": "32px",
                "base": "4px",
                "margin-mobile": "16px",
                "lg": "24px",
                "sm": "8px",
                "xl": "32px",
                "gutter": "16px",
                "touch-target-min": "48px"
        },
        "fontFamily": {
                "code-md": ["JetBrains Mono"],
                "code-sm": ["JetBrains Mono"],
                "body-lg": ["Inter"],
                "display-lg": ["Manrope"],
                "headline-md": ["Manrope"],
                "label-caps": ["Inter"],
                "headline-lg": ["Manrope"],
                "body-sm": ["Inter"],
                "body-md": ["Inter"]
        },
        "fontSize": {
                "code-md": ["14px", {"lineHeight": "20px", "fontWeight": "500"}],
                "code-sm": ["12px", {"lineHeight": "16px", "fontWeight": "500"}],
                "body-lg": ["18px", {"lineHeight": "28px", "fontWeight": "400"}],
                "display-lg": ["40px", {"lineHeight": "48px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                "headline-md": ["24px", {"lineHeight": "32px", "fontWeight": "600"}],
                "label-caps": ["12px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "700"}],
                "headline-lg": ["32px", {"lineHeight": "40px", "fontWeight": "600"}],
                "body-sm": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}]
        }
      },
    },
  }
</script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'Inter', sans-serif;
        }
        .pb-safe {
            padding-bottom: env(safe-area-inset-bottom);
        }
        body {
          min-height: max(884px, 100dvh);
        }
    </style>
</head>
<body class="bg-background text-on-surface antialiased min-h-screen flex flex-col">
<!-- TopAppBar -->
<header class="flex items-center justify-between px-margin-mobile h-[72px] w-full docked full-width top-0 bg-surface-container border-b border-outline-variant z-50 sticky">
<div class="flex items-center gap-sm">
<div class="w-10 h-10 rounded-full bg-secondary-container flex items-center justify-center text-on-secondary-container font-bold">
                JS
            </div>
<div class="flex flex-col">
<h1 class="font-headline-md text-lg text-primary">Hola, Jaime</h1>
<span class="font-body-sm text-xs text-on-surface-variant">Unidad de Cuidados</span>
</div>
</div>
<div class="bg-primary-container px-3 py-1 rounded-full">
<span class="font-label-caps text-[10px] text-on-primary-container">ENFERMERO</span>
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow px-margin-mobile pt-lg pb-xl max-w-2xl mx-auto w-full">
<!-- Context Chip Section -->
<div class="flex items-center gap-sm mb-lg bg-surface-container-low border border-outline-variant rounded-xl p-sm">
<div class="w-8 h-8 rounded-full bg-secondary flex items-center justify-center text-on-secondary font-bold text-xs">
                MR
            </div>
<div class="flex flex-col">
<span class="font-label-caps text-[10px] text-outline uppercase tracking-wider">Paciente en curso</span>
<span class="font-body-md font-semibold text-on-surface">María Rodríguez Sánchez</span>
</div>
<div class="ml-auto pr-xs">
<span class="material-symbols-outlined text-outline">info</span>
</div>
</div>
<!-- Note Entry Section -->
<div class="flex flex-col gap-sm">
<div class="flex justify-between items-end">
<label class="font-label-caps text-on-surface-variant uppercase tracking-widest">Nota de Enfermería</label>
<span class="font-code-sm text-primary">124 caracteres</span>
</div>
<div class="relative group">
<textarea class="w-full bg-surface-container-lowest border border-outline-variant rounded-lg p-md font-body-md text-on-surface focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all placeholder:text-outline/50 resize-none" placeholder="Escribe la nota clínica..." rows="12"></textarea>
<!-- Clinical UI Detail: Subtle timestamp/context indicator -->
<div class="absolute bottom-3 right-3 flex items-center gap-xs opacity-40">
<span class="material-symbols-outlined text-sm">schedule</span>
<span class="font-label-caps text-[10px]">AUTO-SAVE ACTIVE</span>
</div>
</div>
<!-- Bento-style Metadata Suggestion Tiles -->
<div class="grid grid-cols-2 gap-sm mt-sm">
<div class="p-sm bg-surface-container-low border border-outline-variant rounded-lg flex flex-col gap-xs hover:bg-surface-container-high transition-colors cursor-pointer">
<span class="material-symbols-outlined text-secondary" data-icon="vital_signs">vital_signs</span>
<span class="font-body-sm text-on-surface">Adjuntar Constantes</span>
</div>
<div class="p-sm bg-surface-container-low border border-outline-variant rounded-lg flex flex-col gap-xs hover:bg-surface-container-high transition-colors cursor-pointer">
<span class="material-symbols-outlined text-tertiary" data-icon="medical_information">medical_information</span>
<span class="font-body-sm text-on-surface">Plan Terapéutico</span>
</div>
</div>
</div>
</main>
<!-- Bottom Action Bar -->
<div class="px-margin-mobile py-lg bg-surface-container-high border-t border-outline-variant flex flex-col gap-md">
<button class="w-full h-touch-target-min bg-primary text-on-primary rounded-xl font-body-md font-bold flex items-center justify-center gap-sm active:scale-95 transition-transform shadow-sm">
<span class="material-symbols-outlined" data-weight="fill">save</span>
            Guardar nota
        </button>
<button class="w-full h-touch-target-min border border-secondary text-secondary rounded-xl font-label-caps flex items-center justify-center uppercase tracking-widest hover:bg-secondary/10 transition-colors">
            Descartar borrador
        </button>
</div>
<!-- Persistent Navigation Shell -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center bg-surface-container px-xs pb-safe h-[64px] border-t border-outline-variant">
<div class="flex flex-col items-center justify-center text-on-surface-variant hover:text-on-surface px-3 py-1 rounded-xl">
<span class="material-symbols-outlined">search</span>
<span class="font-label-caps text-[10px]">Buscar</span>
</div>
<div class="flex flex-col items-center justify-center text-primary bg-primary/10 rounded-xl px-3 py-1 scale-95 transition-transform duration-100">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">groups</span>
<span class="font-label-caps text-[10px]">Pacientes</span>
</div>
<div class="flex flex-col items-center justify-center text-on-surface-variant hover:text-on-surface px-3 py-1 rounded-xl">
<span class="material-symbols-outlined">admin_panel_settings</span>
<span class="font-label-caps text-[10px]">Admin</span>
</div>
<div class="flex flex-col items-center justify-center text-on-surface-variant hover:text-on-surface px-3 py-1 rounded-xl">
<span class="material-symbols-outlined">star</span>
<span class="font-label-caps text-[10px]">Favoritos</span>
</div>
<div class="flex flex-col items-center justify-center text-on-surface-variant hover:text-on-surface px-3 py-1 rounded-xl">
<span class="material-symbols-outlined">person</span>
<span class="font-label-caps text-[10px]">Perfil</span>
</div>
</nav>
<!-- Spacer for Navigation -->
<div class="h-[64px] pb-safe"></div>
</body></html>
