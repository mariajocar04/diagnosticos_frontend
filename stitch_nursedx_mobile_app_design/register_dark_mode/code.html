<!DOCTYPE html>

<html class="dark" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=JetBrains+Mono:wght@500&amp;family=Manrope:wght@600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "secondary-fixed-dim": "#a2c9ff",
                        "secondary-container": "#0274cb",
                        "inverse-surface": "#e5e2e1",
                        "on-error": "#690005",
                        "surface-container": "#201f1f",
                        "outline": "#86948b",
                        "on-secondary-container": "#f7f8ff",
                        "error-container": "#93000a",
                        "primary-container": "#23c18f",
                        "tertiary-container": "#ff8978",
                        "on-primary-fixed-variant": "#005139",
                        "on-tertiary-fixed-variant": "#80291f",
                        "on-tertiary": "#61120b",
                        "secondary-fixed": "#d3e4ff",
                        "tertiary-fixed": "#ffdad5",
                        "surface-container-highest": "#353534",
                        "surface-container-lowest": "#0e0e0e",
                        "on-tertiary-fixed": "#410000",
                        "tertiary-fixed-dim": "#ffb4a8",
                        "on-primary": "#003827",
                        "surface-dim": "#131313",
                        "on-secondary-fixed-variant": "#004881",
                        "surface": "#131313",
                        "error": "#ffb4ab",
                        "primary": "#4edeaa",
                        "surface-tint": "#4edeaa",
                        "on-primary-fixed": "#002115",
                        "primary-fixed-dim": "#4edeaa",
                        "inverse-on-surface": "#313030",
                        "inverse-primary": "#006c4d",
                        "on-primary-container": "#004933",
                        "surface-container-high": "#2a2a2a",
                        "on-surface-variant": "#bbcac1",
                        "surface-container-low": "#1c1b1b",
                        "on-error-container": "#ffdad6",
                        "secondary": "#a2c9ff",
                        "surface-variant": "#353534",
                        "on-secondary-fixed": "#001c38",
                        "surface-bright": "#393939",
                        "on-secondary": "#00315c",
                        "on-surface": "#e5e2e1",
                        "outline-variant": "#3c4a43",
                        "primary-fixed": "#6efbc4",
                        "on-tertiary-container": "#752118",
                        "on-background": "#e5e2e1",
                        "tertiary": "#ffb4a8",
                        "background": "#131313"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "md": "16px",
                        "xs": "4px",
                        "margin-desktop": "32px",
                        "base": "4px",
                        "margin-mobile": "16px",
                        "lg": "24px",
                        "sm": "8px",
                        "xl": "32px",
                        "gutter": "16px"
                    },
                    "fontFamily": {
                        "code-md": ["JetBrains Mono"],
                        "code-sm": ["JetBrains Mono"],
                        "body-lg": ["Inter"],
                        "display-lg": ["Manrope"],
                        "headline-md": ["Manrope"],
                        "label-caps": ["Inter"],
                        "headline-lg": ["Manrope"],
                        "body-sm": ["Inter"],
                        "body-md": ["Inter"]
                    },
                    "fontSize": {
                        "code-md": ["14px", {"lineHeight": "20px", "fontWeight": "500"}],
                        "code-sm": ["12px", {"lineHeight": "16px", "fontWeight": "500"}],
                        "body-lg": ["18px", {"lineHeight": "28px", "fontWeight": "400"}],
                        "display-lg": ["40px", {"lineHeight": "48px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                        "headline-md": ["24px", {"lineHeight": "32px", "fontWeight": "600"}],
                        "label-caps": ["12px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "700"}],
                        "headline-lg": ["32px", {"lineHeight": "40px", "fontWeight": "600"}],
                        "body-sm": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                        "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}]
                    }
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            line-height: 1;
            text-transform: none;
            letter-spacing: normal;
            word-wrap: normal;
            white-space: nowrap;
            direction: ltr;
        }
        body {
            background-color: #131313;
            -webkit-font-smoothing: antialiased;
        }
    </style>
</head>
<body class="bg-background text-on-surface">
<div class="min-h-screen flex flex-col md:flex-row">
<!-- Desktop Sidebar Illustration -->
<div class="hidden md:flex md:w-1/2 bg-surface-container-high items-center justify-center relative overflow-hidden">
<div class="absolute inset-0 opacity-5 bg-[radial-gradient(#4edeaa_1px,transparent_1px)] [background-size:20px_20px]"></div>
<div class="z-10 px-xl text-center max-w-md">
<div class="mb-lg inline-flex items-center justify-center w-16 h-16 bg-primary-container rounded-xl">
<span class="material-symbols-outlined text-on-primary-container text-[32px]">medical_services</span>
</div>
<h1 class="font-headline-lg text-headline-lg text-primary mb-sm">TICOS Health Ecosystem</h1>
<p class="font-body-lg text-body-lg text-on-surface-variant">Gestión clínica avanzada diseñada para enfermeros y administradores médicos con precisión y claridad.</p>
<div class="mt-xl">
<img alt="Clinical environment" class="rounded-xl border border-outline-variant shadow-sm w-full h-64 object-cover grayscale opacity-80" data-alt="A professional medical environment featuring a high-tech clinical workspace with soft natural lighting. A nurse is seen from a respectful distance interacting with a modern digital interface. The overall aesthetic is clean, minimalist, and clinical, emphasizing the teal and white color palette of the TICOS brand. The mood is calm, authoritative, and focused on healthcare efficiency." src="https://lh3.googleusercontent.com/aida-public/AB6AXuCi9GzBfMt87YQ9SWzKWlKat8TsbDd3PCvTuDlvC12uRc8SH5nI7c77RnAD1Qw6MRkQO6XO95BggjWGHnsi-YGW1ZJygmoUJ_Ef471sBDXtCVHhrz_6TZa4nd3Vpu2UUFfIuQX8DA41q06uX_kqm_otr0B1KV_bLsLiHGcsRsNq5Bv7Vxb8h6ubv4eDX7yCy0V4OreAucs805E03XTlEaVu8lLqtrdmCA0UIjyF1Yk6b15YaD1L29t94OMprwa2erUXjFkPbegrkNrI"/>
</div>
</div>
</div>
<!-- Registration Form -->
<main class="flex-1 flex items-center justify-center px-margin-mobile py-xl md:py-0">
<div class="w-full max-w-[400px]">
<header class="mb-xl text-center md:text-left">
<div class="md:hidden flex justify-center mb-md">
<span class="font-headline-lg text-headline-lg text-primary">TICOS</span>
</div>
<h2 class="font-headline-lg text-headline-lg text-on-surface mb-xs">Crear cuenta</h2>
<p class="font-body-md text-body-md text-on-surface-variant">Complete los datos para registrarse en la plataforma clínica.</p>
</header>
<form class="space-y-lg">
<div class="space-y-base">
<label class="font-label-caps text-label-caps text-on-surface-variant uppercase block" for="fullname">Nombre completo</label>
<div class="relative">
<input class="w-full h-12 border border-outline-variant bg-surface-container-lowest px-md rounded-lg focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary font-body-md text-on-surface placeholder:text-outline/50 transition-all" id="fullname" name="fullname" placeholder="Ej. Juan Pérez" type="text"/>
</div>
</div>
<div class="space-y-base">
<label class="font-label-caps text-label-caps text-on-surface-variant uppercase block" for="email">Correo electrónico</label>
<div class="relative">
<input class="w-full h-12 border border-outline-variant bg-surface-container-lowest px-md rounded-lg focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary font-body-md text-on-surface placeholder:text-outline/50 transition-all" id="email" name="email" placeholder="nombre@clinica.com" type="email"/>
</div>
</div>
<div class="space-y-base">
<label class="font-label-caps text-label-caps text-on-surface-variant uppercase block" for="password">Contraseña</label>
<div class="relative">
<input class="w-full h-12 border border-outline-variant bg-surface-container-lowest px-md rounded-lg focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary font-body-md text-on-surface placeholder:text-outline/50 transition-all" id="password" name="password" placeholder="••••••••" type="password"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-on-surface-variant" type="button">
<span class="material-symbols-outlined text-[20px]">visibility</span>
</button>
</div>
</div>
<div class="space-y-base">
<label class="font-label-caps text-label-caps text-on-surface-variant uppercase block" for="confirm-password">Confirmar contraseña</label>
<div class="relative">
<input class="w-full h-12 border border-outline-variant bg-surface-container-lowest px-md rounded-lg focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary font-body-md text-on-surface placeholder:text-outline/50 transition-all" id="confirm-password" name="confirm-password" placeholder="••••••••" type="password"/>
</div>
</div>
<div class="flex items-start gap-xs py-xs">
<input class="mt-1 w-4 h-4 text-primary border-outline-variant bg-surface-container-lowest rounded focus:ring-primary focus:ring-offset-background" id="terms" type="checkbox"/>
<label class="font-body-sm text-body-sm text-on-surface-variant" for="terms">
                            Acepto los <a class="text-secondary font-semibold hover:underline" href="#">Términos de Servicio</a> y la <a class="text-secondary font-semibold hover:underline" href="#">Política de Privacidad</a>.
                        </label>
</div>
<button class="w-full h-12 bg-primary text-on-primary font-headline-md rounded-lg hover:brightness-110 active:scale-[0.98] transition-all flex items-center justify-center gap-xs" type="submit">
                        Registrarse
                    </button>
<div class="pt-lg text-center border-t border-outline-variant">
<p class="font-body-md text-body-md text-on-surface-variant">
                            ¿Ya tiene una cuenta? 
                            <a class="text-secondary font-semibold hover:underline px-xs" href="#">Iniciar sesión</a>
</p>
</div>
</form>
<footer class="mt-xl text-center md:text-left">
<div class="flex flex-wrap justify-center md:justify-start gap-sm">
<span class="inline-flex items-center px-sm py-1 bg-primary/10 text-primary font-label-caps text-label-caps rounded-full border border-primary/20">
                            ENFERMERO
                        </span>
<span class="inline-flex items-center px-sm py-1 bg-secondary/10 text-secondary font-label-caps text-label-caps rounded-full border border-secondary/20">
                            ADMINISTRADOR
                        </span>
</div>
</footer>
</div>
</main>
</div>
</body></html>
